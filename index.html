<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Finance Pro Final</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- BOTÃO MENU -->
<button onclick="toggleSidebar()"
class="fixed top-3 left-3 bg-gray-800 px-3 py-2 rounded z-50">
☰
</button>

<!-- SIDEBAR -->
<div id="sidebar"
class="fixed top-0 left-0 w-80 h-full bg-gray-950 p-4 transform -translate-x-full transition z-40 overflow-y-auto">

<h2 class="font-bold mb-4">⚙ Painel</h2>

<!-- LOGIN -->
<div class="bg-gray-900 p-3 rounded mb-4">
  <p class="text-sm mb-2">👤 Conta</p>

  <button onclick="login()"
  class="bg-green-600 w-full p-2 rounded mb-2">
    Entrar com Google
  </button>

  <button onclick="logout()"
  class="bg-red-600 w-full p-2 rounded">
    Sair
  </button>

  <p id="userEmail" class="text-xs mt-2"></p>
</div>
<!-- SALDO INICIAL -->
<div class="mb-4">
<p class="text-sm">💰 Saldo inicial</p>
<input id="initialBalance"
type="number"
class="bg-gray-800 p-2 w-full rounded">
<button onclick="setInitial()"
class="bg-green-600 w-full p-2 rounded mt-2">
Salvar
</button>
</div>

<!-- MÊS -->
<div class="mb-4">
<p class="text-sm">📅 Mês</p>
<select id="monthSelect"
class="bg-gray-800 p-2 w-full rounded"
onchange="changeMonth()"></select>
</div>

<!-- DÍVIDA -->
<div class="bg-gray-900 p-3 rounded mb-4">
<p class="text-sm">💸 Dívida restante</p>
<p class="text-red-400 text-lg">R$ <span id="debtLeft">0</span></p>
</div>

<!-- HISTÓRICO -->
<div>
<h3 class="font-bold mb-2">📊 Histórico geral</h3>
<div id="historySidebar" class="space-y-2 text-sm"></div>
</div>

</div>

<!-- MAIN -->
<div class="ml-10 p-4">

<h1 class="text-xl font-bold mb-4">💰 Controle Financeiro</h1>

<div id="balanceBox" class="p-3 rounded bg-gray-700 mb-4">
Saldo: R$ <span id="balance">0</span>
</div>

<div class="grid grid-cols-3 gap-2 mb-4">
<div class="bg-green-900 p-3 rounded">Entradas <p id="income">0</p></div>
<div class="bg-red-900 p-3 rounded">Gastos <p id="expenses">0</p></div>
<div class="bg-blue-900 p-3 rounded">Total <p id="total">0</p></div>
</div>

<!-- ADD -->
<div class="bg-gray-800 p-3 rounded mb-4">

<input id="desc" class="bg-gray-700 p-2 w-full rounded mb-2" placeholder="Descrição">

<select id="category" class="bg-gray-700 p-2 w-full rounded mb-2">
<option>Água</option>
<option>Transporte</option>
<option>Contas</option>
<option>Alimentação</option>
<option>Outros</option>
</select>

<input id="value" type="number"
class="bg-gray-700 p-2 w-full rounded mb-2"
placeholder="Valor (negativo = gasto)">

<button onclick="add()"
class="bg-blue-600 w-full p-2 rounded">
Adicionar
</button>

</div>

<h2 class="font-bold mb-2">📌 Lista</h2>
<div id="list" class="space-y-2"></div>

</div>

<script>

// ---------------- FIREBASE ----------------
const firebaseConfig = {
  apiKey: "AIzaSyC8Uz0IBqtqrmfTtECv3gr5rqbIWY4gIF0",
  authDomain: "meu-consumo-financeiro.firebaseapp.com",
  projectId: "meu-consumo-financeiro",
  storageBucket: "meu-consumo-financeiro.firebasestorage.app",
  messagingSenderId: "725415055361",
  appId: "1:725415055361:web:116b201e1be0fcd5117000",
  measurementId: "G-0N0XKJCS18"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
  auth.getRedirectResult()
.then((result) => {
  if (result.user) {
    document.getElementById('userEmail').innerText =
      result.user.email;
  }
})
.catch((error) => {
  console.log("Login error:", error);
});

// ---------------- DADOS ----------------
let transactions = {};
let currentMonth = getMonthKey();
let initialBalance = 0;

// ---------------- LOGIN ----------------
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

function logout(){
  auth.signOut();
  document.getElementById('userEmail').innerText = '';
}

// ---------------- MÊS ----------------
function getMonthKey(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}`;
}

// ---------------- SIDEBAR ----------------
function toggleSidebar(){
  document.getElementById('sidebar')
  .classList.toggle('-translate-x-full');
}

// ---------------- INIT MESES ----------------
function initMonths(){
  const select = document.getElementById('monthSelect');

  const year = new Date().getFullYear();

  for(let i=1;i<=12;i++){
    const opt = document.createElement('option');
    opt.value = `${year}-${i}`;
    opt.innerText = `${year}-${i}`;
    select.appendChild(opt);
  }

  select.value = currentMonth;
}

// ---------------- CHANGE MONTH ----------------
function changeMonth(){
  currentMonth = document.getElementById('monthSelect').value;
  load();
  render();
}

// ---------------- ADD ----------------
function add(){

  const desc = document.getElementById('desc').value;
  const value = parseFloat(document.getElementById('value').value);
  const category = document.getElementById('category').value;

  if(!desc || isNaN(value)) return;

  if(!transactions[currentMonth]) transactions[currentMonth] = [];

  transactions[currentMonth].push({
    id: Date.now(),
    desc,
    value,
    category,
    paid: false
  });

  save();
  render();
}

// ---------------- TOGGLE PAGO ----------------
function togglePaid(id){

  const t = transactions[currentMonth].find(x => x.id === id);
  t.paid = !t.paid;

  save();
  render();
}

// ---------------- DELETE ----------------
function del(id){
  transactions[currentMonth] =
    transactions[currentMonth].filter(t => t.id !== id);

  save();
  render();
}

// ---------------- SAVE ----------------
function save(){
  localStorage.setItem("financeAppFinal", JSON.stringify({
    transactions,
    initialBalance
  }));
}

// ---------------- LOAD ----------------
function load(){
  const data = JSON.parse(localStorage.getItem("financeAppFinal"));
  if(data){
    transactions = data.transactions || {};
    initialBalance = data.initialBalance || 0;
  }
}

// ---------------- SALDO ----------------
function setInitial(){
  initialBalance =
    parseFloat(document.getElementById('initialBalance').value) || 0;

  save();
  render();
}

// ---------------- RENDER ----------------
function render(){

  const list = document.getElementById('list');
  const history = document.getElementById('historySidebar');

  list.innerHTML = '';
  history.innerHTML = '';

  let income = 0;
  let expenses = 0;
  let debtLeft = 0;

  const monthData = transactions[currentMonth] || [];

  monthData.forEach(t => {

    if(t.value > 0) income += t.value;
    else expenses += t.value;

    if(t.value < 0 && !t.paid){
      debtLeft += Math.abs(t.value);
    }

  let status = "";

if (t.value < 0 && !t.paid) {
  status = "PENDENTE";
}

if (t.paid) {
  status = "PAGO";
}

    list.innerHTML += `
      <div class="bg-gray-800 p-2 rounded flex justify-between">

        <div>
          ${t.desc} (${t.category}) - R$ ${t.value}
          <span class="${t.paid ? 'text-green-400' : ''}">
            ${status}
          </span>
        </div>

        <div class="flex gap-2">
          <button onclick="togglePaid(${t.id})">✔</button>
          <button onclick="del(${t.id})">❌</button>
        </div>

      </div>
    `;
  });

  document.getElementById('income').innerText = income;
  document.getElementById('expenses').innerText = Math.abs(expenses);
  document.getElementById('total').innerText = income + expenses;
  document.getElementById('balance').innerText = initialBalance + income + expenses;
  document.getElementById('debtLeft').innerText = debtLeft;
}

// ---------------- INIT ----------------
load();
initMonths();
render();

</script>

</body>
</html>
